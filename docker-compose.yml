services:
  postgres:
    image: postgres:16
    container_name: htx_trading_bot_postgres
    env_file:
      - .env.postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: htx_trading_bot_redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  collector:
    build: ./collector
    container_name: htx_trading_bot_collector
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./collector:/app
    command: python main.py
    restart: unless-stopped

  chatbot:
    build: ./chatbot
    container_name: htx_trading_bot_chatbot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./chatbot:/app
    command: python main.py
    restart: unless-stopped

  webui:
    build: ./webui
    container_name: htx_trading_bot_webui
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      collector:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./webui:/app
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - '${WEBUI_PORT:-8080}:8000'
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
